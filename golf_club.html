<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Club Controller</title>
  <link rel="stylesheet" href="./static/css/app.css">
</head>
<body class="controller-body golf-club-body">
  <section id="pairing-gate" class="pairing-gate" role="dialog" aria-modal="true" aria-labelledby="pairing-gate-title">
    <div class="pairing-gate-backdrop" aria-hidden="true"></div>
    <section class="pairing-gate-panel panel">
      <div class="panel-heading pairing-gate-heading">
        <p class="eyebrow">Controller Link</p>
        <h1 id="pairing-gate-title" class="pairing-gate-title">Connect golf club</h1>
        <p class="pairing-gate-copy">Enter the game client id before using the controller.</p>
      </div>
      <p id="pairing-gate-status" class="status-pill pairing-gate-status">Offline</p>
      <label class="pairing-field" for="room-code-input">
        <span class="debug-label">Game client id</span>
        <input id="room-code-input" class="launch-debug-input pairing-code-input" type="tel" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" maxlength="4" placeholder="1234">
      </label>
      <div class="pairing-gate-actions">
        <button id="connect-button" class="action-button primary pairing-gate-button">Connect</button>
      </div>
    </section>
  </section>
  <main class="controller-shell">
    <section class="controller-corner-actions" aria-label="Swing mode controls">
      <button id="practice-swing-button" class="action-button mode-button practice-mode-button" disabled>
        <span>Practice</span>
        <span>swing</span>
      </button>
      <button id="actual-swing-button" class="action-button mode-button actual-mode-button" disabled>
        <span>Actual</span>
        <span>swing</span>
      </button>
    </section>
    <section class="controller-playfield">
      <section id="aim-joystick" class="aim-joystick" aria-label="Aim joystick. Drag to rotate and adjust aim preview. Double tap to toggle aim camera.">
        <div class="aim-joystick-visual" aria-hidden="true">
          <div class="aim-joystick-base"></div>
          <div class="aim-joystick-knob"></div>
        </div>
      </section>
      <section class="controller-dock">
        <section class="panel controls-panel">
          <p id="controller-status" class="status-pill">Offline</p>
          <div class="control-row club-row">
            <button id="club-prev-button" class="action-button secondary club-button" disabled aria-label="Previous club">Club -</button>
            <button id="club-next-button" class="action-button secondary club-button" disabled aria-label="Next club">Club +</button>
          </div>
          <div class="control-row dock-actions-row">
            <button id="calibrate-button" class="action-button secondary" disabled>Set Forward</button>
          </div>
        </section>
        <p id="controller-debug" class="orientation-copy">Orientation and gyro waiting</p>
      </section>
    </section>
  </main>
  <script type="importmap">
    {
      "imports": {
        "/static/js/": "./static/js/",
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js"
      }
    }
  </script>
  <script type="module" src="./static/js/golf_club.js"></script>
</body>
</html>
